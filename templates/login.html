{% extends "base.html" %}

{% block title %}Login - Sentiment Analysis System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-center text-muted mb-4">
                        Welcome to Sentiment Analysis System<br>
                        <small>English & Swahili Text Classification</small>
                    </p>
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="fas fa-user"></i> Username or Email
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="username" 
                                   name="username" 
                                   placeholder="Enter username or email"
                                   required 
                                   autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Enter password"
                                   required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <p class="text-center mb-0">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" class="text-decoration-none">
                            Register here
                        </a>
                    </p>
                    
                    <!-- Demo Account Info -->
                    <div class="alert alert-info mt-3 mb-0">
                        <strong><i class="fas fa-info-circle"></i> Demo Account:</strong><br>
                        <small>
                            <strong>Username:</strong> demo<br>
                            <strong>Password:</strong> demo123
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
